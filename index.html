<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="個人網站，展示自我介紹、技能、作品與聯絡方式。"
    />
    <title>eric yeh | Resume</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-grid"></div>

    <header class="topbar">
      <a class="brand" href="#home">eric yeh</a>
      <nav class="nav">
        <a href="#about">關於我</a>
        <a href="#skills">技能</a>
        <a href="#projects">作品</a>
        <a href="#timeline">經歷</a>
        <a href="#contact">聯絡</a>
      </nav>
      <button class="theme-switch" id="themeSwitch" type="button" aria-pressed="false">
        <span class="switch-track">
          <span class="switch-thumb"></span>
        </span>
      </button>
    </header>

    <main id="home" class="shell">
      <section class="hero card">
        <div class="hero-copy">
          <p class="eyebrow" data-copy="eyebrow"></p>
          <h1 data-copy="title"></h1>
          <p class="role" data-copy="role"></p>
          <p class="lead" data-copy="lead"></p>
          <div class="hero-actions">
            <a class="button primary" href="#projects" data-copy="primaryCta"></a>
            <a class="button secondary" href="#contact" data-copy="secondaryCta"></a>
          </div>
          <ul class="quick-facts">
            <li><span>地點</span><strong>台北，台灣</strong></li>
            <li><span>狀態</span><strong>開放合作</strong></li>
            <li><span>Email</span><strong>ericyeh@ntsu.edu.tw</strong></li>
          </ul>
        </div>

        <aside class="profile-panel">
          <img class="avatar-image" src="./avatar.svg" alt="eric yeh 個人數位照片" />
          <div class="profile-meta">
            <h2 data-copy="summaryTitle"></h2>
            <p data-copy="summaryBody"></p>
          </div>
          <div class="profile-tags">
            <span data-copy="tag1"></span>
            <span data-copy="tag2"></span>
            <span data-copy="tag3"></span>
          </div>
        </aside>
      </section>

      <section id="about" class="section card reveal">
        <div class="section-heading">
          <p class="eyebrow" data-copy="aboutEyebrow"></p>
          <h2 data-copy="aboutTitle"></h2>
        </div>
        <div class="about-grid about-card">
          <p data-copy="aboutBody1"></p>
          <p data-copy="aboutBody2"></p>
        </div>
      </section>

      <section id="skills" class="section card reveal">
        <div class="section-heading">
          <p class="eyebrow" data-copy="skillsEyebrow"></p>
          <h2 data-copy="skillsTitle"></h2>
        </div>
        <div class="chip-grid" id="skillsList"></div>
      </section>

      <section id="projects" class="section card reveal">
        <div class="section-heading">
          <p class="eyebrow" data-copy="projectsEyebrow"></p>
          <h2 data-copy="projectsTitle"></h2>
        </div>
        <div class="project-grid" id="projectsList"></div>
      </section>

      <section id="timeline" class="section card reveal">
        <div class="section-heading">
          <p class="eyebrow" data-copy="timelineEyebrow"></p>
          <h2 data-copy="timelineTitle"></h2>
        </div>
        <ol class="timeline">
          <li>
            <span>2026</span>
            <div>
              <h3 data-copy="timeline1Title"></h3>
              <p data-copy="timeline1Body"></p>
            </div>
          </li>
          <li>
            <span>2024</span>
            <div>
              <h3 data-copy="timeline2Title"></h3>
              <p data-copy="timeline2Body"></p>
            </div>
          </li>
          <li>
            <span>2022</span>
            <div>
              <h3 data-copy="timeline3Title"></h3>
              <p data-copy="timeline3Body"></p>
            </div>
          </li>
        </ol>
      </section>

      <section id="contact" class="section card reveal contact-card">
        <div class="section-heading">
          <p class="eyebrow" data-copy="contactEyebrow"></p>
          <h2 data-copy="contactTitle"></h2>
        </div>
        <p class="contact-copy" data-copy="contactBody"></p>
        <a class="button primary" href="mailto:ericyeh@ntsu.edu.tw" data-copy="contactCta"></a>
      </section>
    </main>

    <footer class="footer">
      <p>© 2026 eric yeh. All rights reserved.</p>
    </footer>

    <script src="./script.js"></script>
  </body>
</html>
